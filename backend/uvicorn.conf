# Uvicorn configuration for production deployment
# Supports 100+ concurrent users with multiple workers

# Worker configuration
workers = 4
worker_class = "uvicorn.workers.UvicornWorker"

# Binding
host = "0.0.0.0"
port = 8000

# Logging
log_level = "info"
access_log = true
error_log = true

# Performance tuning
max_requests = 10000
max_requests_jitter = 1000
keepalive = 5
timeout = 30

# Memory management (restart workers after handling this many requests)
max_requests = 10000

# SSL (uncomment for production with HTTPS)
# keyfile = "key.pem"
# certfile = "cert.pem"

# Application import path
module = "app.main:app"

# Run as daemon
daemon = false

# PID file
pidfile = "uvicorn.pid"

# Reload (disable in production)
reload = false

# SSL settings (for production HTTPS termination at Nginx)
# preload_app = true